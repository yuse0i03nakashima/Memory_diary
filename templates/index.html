<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="記憶のノート">
  <meta name="theme-color" content="#0c0d11">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <title>記憶のノート</title>
  <style>
    :root {
      --bg:#0c0d11; --surface:#13151e; --border:#252838; --border-light:#2f3347;
      --text:#dde1ec; --text-muted:#9aa3b8; --text-dim:#555d7a;
      --blue:#5b8ff9; --green:#4ade80; --red:#ef4444;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'DM Mono',monospace;
      background:var(--bg); color:var(--text);
      padding:20px 14px 60px; line-height:1.7;
    }
    .wrap { max-width:560px; margin:0 auto; }
    header { display:flex; align-items:baseline; justify-content:space-between;
      margin-bottom:8px; }
    h1 { font-size:16px; letter-spacing:2px; color:var(--blue); font-weight:500; }
    .date { font-size:11px; color:var(--text-dim); letter-spacing:1px; }
    .card {
      background:var(--surface); border:1px solid var(--border-light);
      border-top:2px solid var(--blue); padding:18px 16px; margin-top:18px;
    }
    .label { font-size:9px; letter-spacing:2px; text-transform:uppercase;
      color:var(--text-muted); margin-bottom:12px; }
    textarea, input[type="text"] {
      width:100%; padding:12px; background:#1b1e2b; border:1px solid var(--border-light);
      color:var(--text); font-family:'DM Mono',monospace; font-size:16px;
      outline:none; resize:vertical; transition:border-color 0.15s;
    }
    textarea:focus, input[type="text"]:focus { border-color:var(--blue); }
    textarea { min-height:64px; }
    button {
      padding:12px 18px; background:var(--blue); color:#0c0d11;
      font-family:'DM Mono',monospace; font-size:13px; letter-spacing:1px;
      border:none; cursor:pointer; transition:background 0.15s; margin-top:10px;
    }
    button:hover { background:#7aaafb; }
    button.ghost { background:transparent; color:var(--blue);
      border:1px solid var(--border-light); }
    button.ghost:hover { background:#1b1e2b; }

    /* 記録1件 */
    .entry { display:flex; gap:10px; align-items:flex-start;
      padding:10px 0; border-bottom:1px solid var(--border); }
    .entry:last-child { border-bottom:none; }
    .entry .time { font-size:11px; color:var(--blue); flex-shrink:0;
      padding-top:2px; white-space:nowrap; }
    .body-wrap { flex:1; min-width:0; }
    .entry .body { font-size:14px; white-space:pre-wrap; word-break:break-word; }
    .edit-form { display:none; margin:2px 0; }
    .edit-form textarea { min-height:48px; }
    .edit-actions { display:flex; gap:8px; }
    button.mini { padding:6px 12px; font-size:11px; margin-top:8px; }
    .row-actions { display:flex; gap:2px; flex-shrink:0; }
    button.icon { background:transparent; border:none; color:var(--text-dim);
      padding:2px 6px; margin:0; font-size:15px; line-height:1; cursor:pointer; }
    button.icon:hover { color:var(--blue); }
    button.icon.del:hover { color:var(--red); }

    .empty { font-size:12px; color:var(--text-dim); }
    .out { margin-top:14px; padding:14px; background:#11131c;
      border:1px solid var(--border); font-size:14px; white-space:pre-wrap;
      word-break:break-word; min-height:8px; }
    .out:empty { display:none; }
    .alllink { display:inline-block; color:var(--blue); text-decoration:none;
      font-size:14px; padding:4px 0; }
    .alllink:hover { text-decoration:underline; }
  </style>
</head>
<body>
{% from '_entry.html' import entry_row %}

  <div class="wrap">
    <header>
      <h1>記憶のノート</h1>
      <span class="date">{{ today }}</span>
    </header>

    <!-- 記録する -->
    <div class="card">
      <div class="label">いま起きたことを記録する</div>
      <form method="POST" action="/add">
        <textarea name="text" placeholder="例：田中さんに金曜の昼に会う約束をした" autofocus></textarea>
        <button type="submit">記録する</button>
      </form>
    </div>

    <!-- 今日の記録 -->
    <div class="card">
      <div class="label">今日の記録</div>
      {% if today_entries %}
        {% for e in today_entries %}{{ entry_row(e) }}{% endfor %}
      {% else %}
        <div class="empty">まだ今日の記録はありません。</div>
      {% endif %}
    </div>

    <!-- まとめる -->
    <div class="card">
      <div class="label">今日をまとめる</div>
      <button class="ghost" onclick="summarize()">今日の出来事をまとめてもらう</button>
      <div class="out" id="summary-out"></div>
    </div>

    <!-- ふりかえる・きく -->
    <div class="card">
      <div class="label">ふりかえる・きく</div>
      <input type="text" id="question"
             placeholder="例：田中さんとはいつ会う約束だった？"
             onkeydown="if(event.key==='Enter')ask();">
      <button onclick="ask()">記録から答えてもらう</button>
      <div class="out" id="ask-out"></div>
    </div>

    <!-- すべての記録へ -->
    <div class="card">
      <div class="label">これまでの記録</div>
      <a class="alllink" href="/history">すべての記録を見る・直す →</a>
    </div>
  </div>

  <script>
    function startEdit(btn) {
      const row = btn.closest('.entry');
      row.querySelector('.body').style.display = 'none';
      const form = row.querySelector('.edit-form');
      form.style.display = 'block';
      form.querySelector('textarea').focus();
    }
    function cancelEdit(btn) {
      const row = btn.closest('.entry');
      row.querySelector('.edit-form').style.display = 'none';
      row.querySelector('.body').style.display = '';
    }
    async function summarize() {
      const out = document.getElementById('summary-out');
      out.textContent = 'まとめています…';
      try {
        const r = await fetch('/summarize', { method: 'POST' });
        const d = await r.json();
        out.textContent = d.summary;
      } catch (e) {
        out.textContent = '（通信エラー。もう一度お試しください）';
      }
    }
    async function ask() {
      const q = document.getElementById('question').value.trim();
      if (!q) return;
      const out = document.getElementById('ask-out');
      out.textContent = '記録を調べています…';
      try {
        const r = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q })
        });
        const d = await r.json();
        out.textContent = d.answer;
      } catch (e) {
        out.textContent = '（通信エラー。もう一度お試しください）';
      }
    }
  </script>
</body>
</html>
